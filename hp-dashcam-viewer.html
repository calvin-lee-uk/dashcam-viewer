<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP Dashcam Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,Arial,sans-serif;background:#f0efe9;color:#1a1a1a}

/* ── Root: vertical split ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;padding:8px;gap:8px}

/* ── Top: video row ── */
.video-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0}
.vcam{background:#000;border-radius:7px;overflow:hidden;position:relative}
.vcam-lbl{
  position:absolute;top:7px;left:7px;z-index:1;
  background:rgba(0,0,0,.55);color:#fff;
  font-size:10px;font-weight:500;padding:2px 7px;border-radius:3px;letter-spacing:.05em;
}
.vcam video{width:100%;display:block}
.vcam-blank{
  width:100%;aspect-ratio:16/9;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:#555;letter-spacing:.03em;background:#111;
}

/* ── Bottom: lower-row + sbar ── */
.lower-section{display:flex;flex-direction:column;flex:1;min-height:0;gap:6px}

/* 3-column grid: sidebar | map | telem */
.lower-row{
  display:grid;
  grid-template-columns:200px 1fr 160px;
  gap:8px;flex:1;min-height:0;
}

/* ── Sidebar (now inside lower-row) ── */
.sidebar{
  background:#fff;border-radius:7px;border:1px solid #e2e2dd;
  display:flex;flex-direction:column;overflow:hidden;min-height:0;
}
.sb-top{padding:8px;border-bottom:1px solid #e2e2dd;flex-shrink:0}
.folder-wrap{position:relative}
.folder-wrap input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;width:100%;height:100%;
}
.folder-wrap label{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;background:#f5f4ef;
  border:1px solid #ddd;border-radius:6px;
  font-size:11px;cursor:pointer;transition:background .15s;white-space:nowrap;
}
.folder-wrap label:hover{background:#e8e7e0}
.folder-path{
  margin-top:4px;font-size:10px;color:#aaa;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px;min-height:13px;
}
.sb-label{
  font-size:9px;font-weight:500;text-transform:uppercase;
  letter-spacing:.07em;color:#bbb;padding:6px 8px 3px;flex-shrink:0;
}
.rec-list{flex:1;overflow-y:auto}
.rec-empty{padding:14px 8px;font-size:11px;color:#c0bfb8;text-align:center;line-height:1.8}
.rec-item{
  padding:5px 8px;border-bottom:1px solid #f5f4ef;
  cursor:pointer;transition:background .1s;user-select:none;
}
.rec-item:hover{background:#f5f4ef}
.rec-item.active{background:#e5f0fa}
.ri-date{font-size:11px;font-variant-numeric:tabular-nums;color:#1a1a1a;display:inline;padding-right:.6em}
.ri-wkday{font-size:11px;color:#999;display:inline}
.ri-time{font-size:11px;font-weight:500;color:#000;font-variant-numeric:tabular-nums;display:inline;padding-left:.6em}
.rec-item.active .ri-date{color:#1a6ea8}
.rec-item.active .ri-time{color:#5a9fd4}
.ri-badges{margin-top:2px;display:flex;gap:3px}
.ri-badge{
  font-size:9px;font-weight:500;letter-spacing:.04em;
  padding:1px 4px;border-radius:3px;
  background:#eef4ea;color:#5c9e2c;border:1px solid #c8e0b8;
}
.ri-badge.miss{background:#f5f4ef;color:#bbb;border-color:#e2e2dd}

/* ── Map ── */
#map{border-radius:7px;border:1px solid #e2e2dd}

/* ── Telemetry (vertical list) ── */
.telem{
  background:#fff;border-radius:7px;border:1px solid #e2e2dd;
  padding:8px;display:flex;flex-direction:column;gap:0;overflow-y:auto;
}
.telem-title{
  font-size:9px;font-weight:500;text-transform:uppercase;
  letter-spacing:.07em;color:#bbb;margin-bottom:6px;flex-shrink:0;
}
.trow{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 0;border-bottom:1px solid #f5f4ef;flex-shrink:0;
}
.trow:last-child{border-bottom:none}
.trow .lbl{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}
.trow .val{font-size:12px;font-weight:500;color:#1a1a1a;text-align:right}
.trow .val.big{font-size:16px}
.trow select{
  font-size:10px;padding:1px 2px;border:1px solid #ddd;
  border-radius:4px;background:#f5f4ef;color:#555;cursor:pointer;
  max-width:100px;
}

/* ── Status bar ── */
.sbar{
  background:#fff;border-radius:7px;border:1px solid #e2e2dd;
  padding:6px 10px;display:flex;gap:8px;align-items:center;
  font-size:10px;color:#888;flex-wrap:wrap;flex-shrink:0;
}
.dot{width:6px;height:6px;border-radius:50%;background:#5c9e2c;flex-shrink:0;display:inline-block}
.dot.w{background:#d08c10}

/* ── Placeholder ── */
.placeholder{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;text-align:center;
}
.ph-ico{font-size:34px;opacity:.35}
.placeholder p{font-size:13px;line-height:1.7;color:#bbb}
</style>
</head>
<body>

<div class="app">

  <!-- ── Top: video row ── -->
  <div class="video-row" id="video-row">
    <div class="vcam"><span class="vcam-lbl">FRONT</span><video id="vf" controls preload="metadata"></video></div>
    <div class="vcam" id="vcam-rear">
      <span class="vcam-lbl">REAR</span>
      <video id="vr" controls preload="metadata"></video>
      <div id="vcam-rear-blank" class="vcam-blank" style="display:none">No rear recording</div>
    </div>
  </div>

  <!-- ── Bottom: lower-row + sbar ── -->
  <div class="lower-section">

    <div class="lower-row" id="lower-row">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sb-top">
          <div class="folder-wrap">
            <input type="file" id="folder-input" webkitdirectory multiple>
            <label for="folder-input">&#128193; Select folder</label>
          </div>
          <div class="folder-path" id="folder-path"></div>
        </div>
        <div class="sb-label">Recordings</div>
        <div class="rec-list" id="rec-list">
          <div class="rec-empty">Select the dashcam parent folder above.<br>Recordings in F/ will be listed here.</div>
        </div>
      </aside>

      <!-- Map -->
      <div id="map">
        <div class="placeholder" id="placeholder">
          <div class="ph-ico">&#127909;</div>
          <p>Double-click a recording<br>from the list to begin</p>
        </div>
      </div>

      <!-- Telemetry -->
      <div class="telem" id="telem">
        <div class="telem-title">Telemetry</div>

        <div class="trow">
          <span class="lbl">Time zone</span>
          <select id="sel-tz" title="Time zone">
            <option value="-12">UTC−12</option>
            <option value="-11">UTC−11</option>
            <option value="-10">UTC−10 HST</option>
            <option value="-9">UTC−9 AKST</option>
            <option value="-8">UTC−8 PST</option>
            <option value="-7">UTC−7 MST</option>
            <option value="-6">UTC−6 CST</option>
            <option value="-5">UTC−5 EST</option>
            <option value="-4">UTC−4 AST</option>
            <option value="-3">UTC−3</option>
            <option value="-2">UTC−2</option>
            <option value="-1">UTC−1</option>
            <option value="0">UTC</option>
            <option value="1">UTC+1 BST</option>
            <option value="2">UTC+2 CEST</option>
            <option value="3">UTC+3 MSK</option>
            <option value="4">UTC+4 GST</option>
            <option value="5">UTC+5 PKT</option>
            <option value="5.5">UTC+5:30 IST</option>
            <option value="6">UTC+6 BST</option>
            <option value="7">UTC+7 ICT</option>
            <option value="8">UTC+8 CST</option>
            <option value="9">UTC+9 JST</option>
            <option value="9.5">UTC+9:30 ACST</option>
            <option value="10">UTC+10 AEST</option>
            <option value="11">UTC+11</option>
            <option value="12">UTC+12 NZST</option>
          </select>
        </div>

        <div class="trow">
          <span class="lbl">Speed unit</span>
          <select id="sel-spd" title="Speed unit">
            <option value="kmh">km/h</option>
            <option value="mph" selected>mph</option>
            <option value="kn">kn</option>
          </select>
        </div>

        <div class="trow">
          <span class="lbl" id="tel-time-lbl">Time</span>
          <span class="val" id="tel-time">—</span>
        </div>

        <div class="trow">
          <span class="lbl">Speed</span>
          <span class="val big"><span id="tel-spd">—</span><span id="tel-spd-u" style="font-size:10px;color:#aaa"> mph</span></span>
        </div>

        <div class="trow">
          <span class="lbl">Latitude</span>
          <span class="val" id="tel-lat">—</span>
        </div>

        <div class="trow">
          <span class="lbl">Longitude</span>
          <span class="val" id="tel-lon">—</span>
        </div>

        <div class="trow">
          <span class="lbl">Altitude</span>
          <span class="val"><span id="tel-alt">—</span><span style="font-size:10px;color:#aaa"> m</span></span>
        </div>

        <div class="trow">
          <span class="lbl">Satellites</span>
          <span class="val" id="tel-sat">—</span>
        </div>

        <div class="trow">
          <span class="lbl">HDOP</span>
          <span class="val" id="tel-hdop">—</span>
        </div>

        <div class="trow">
          <span class="lbl">Heading</span>
          <span class="val"><span id="tel-crs">—</span><span style="font-size:10px;color:#aaa">°</span></span>
        </div>
      </div>

    </div><!-- /.lower-row -->

    <div class="sbar" id="sbar">
      <span class="dot" id="sdot"></span>
      <span id="smsg">Ready</span>
      <span style="color:#ddd">·</span>
      <span id="sdetail"></span>
      <span id="slocation" style="color:#aaa;font-style:italic"></span>
      <label style="margin-left:auto;display:flex;align-items:center;gap:5px;cursor:pointer;font-size:10px;color:#888;user-select:none">
        <input type="checkbox" id="chk-advance" checked style="cursor:pointer"> Auto-advance
      </label>
    </div>

  </div><!-- /.lower-section -->

</div><!-- /.app -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ═══ State ══════════════════════════════════════════════ */
var allFiles  = {};
var rootName  = '';
var gpsPoints = [];
var ggaMap    = {};
var startUTC  = 0;
var leafMap   = null, gpsMarker = null;
var hasRear   = false, hasGPS = false;
var recsList  = [], activeRecIdx = -1;

/* Set timezone selector to system local offset */
(function() {
  var off = -(new Date().getTimezoneOffset()) / 60; /* minutes west → hours east */
  var sel = document.getElementById('sel-tz');
  /* find closest option value */
  var best = null, bestDist = Infinity;
  for (var i = 0; i < sel.options.length; i++) {
    var v = parseFloat(sel.options[i].value);
    var d = Math.abs(v - off);
    if (d < bestDist) { bestDist = d; best = i; }
  }
  if (best !== null) sel.selectedIndex = best;
})();

var vF = document.getElementById('vf');
var vR = document.getElementById('vr');

/* ═══ Folder picker ══════════════════════════════════════ */
document.getElementById('folder-input').addEventListener('change', function(e) {
  allFiles = {};
  rootName = '';
  var files = e.target.files;
  if (!files || !files.length) return;

  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (!rootName) rootName = f.webkitRelativePath.split('/')[0];
    allFiles[f.webkitRelativePath] = f;
  }

  document.getElementById('folder-path').textContent = rootName;
  scanRecordings();
});

function scanRecordings() {
  var recs = [];
  var re = new RegExp('^' + escRe(rootName) + '\\/F\\/HPIM(\\d{6})-(\\d{6})F\\.MOV$', 'i');
  for (var path in allFiles) {
    var m = path.match(re);
    if (m) {
      var d = m[1], t = m[2], base = 'HPIM' + d + '-' + t;
      var pR = rootName + '/R/' + base + 'R.MOV';
      var pN = rootName + '/F/' + base + 'F.NMEA';
      if (!allFiles[pN]) pN = rootName + '/' + base + 'F.NMEA';
      recs.push({ d: d, t: t, hasR: !!allFiles[pR], hasN: !!allFiles[pN] });
    }
  }
  recs.sort(function(a, b){ return (a.d + a.t) < (b.d + b.t) ? -1 : 1; });
  buildList(recs);
}

function escRe(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

/* ═══ Recording list ══════════════════════════════════════ */
function buildList(recs) {
  var listEl = document.getElementById('rec-list');
  if (!recs.length) {
    listEl.innerHTML = '<div class="rec-empty">No recordings found.<br>Expected files at<br>F/HPIM______-______F.MOV</div>';
    return;
  }
  listEl.innerHTML = '';
  recsList = recs;
  recs.forEach(function(r, idx) {
    var yy = r.d.slice(0,2), mo = r.d.slice(2,4), dd = r.d.slice(4,6);
    var hh = r.t.slice(0,2), mm = r.t.slice(2,4), ss = r.t.slice(4,6);
    var wkdays = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var wkday  = wkdays[new Date(2000+parseInt(yy), parseInt(mo)-1, parseInt(dd)).getDay()];
    var el = document.createElement('div');
    el.className = 'rec-item';
    el.innerHTML =
      '<div class="ri-date">20' + yy + '-' + mo + '-' + dd + '</div>' +
      '<div class="ri-wkday">' + wkday + '</div>' +
      '<div class="ri-time">' + hh + ':' + mm + ':' + ss + '</div>' +
      '<div class="ri-badges">' +
        '<span class="ri-badge' + (r.hasR ? '' : ' miss') + '">REAR</span>' +
        '<span class="ri-badge' + (r.hasN ? '' : ' miss') + '">GPS</span>' +
      '</div>';
    el.addEventListener('click', function() {
      document.querySelectorAll('.rec-item').forEach(function(x){ x.classList.remove('active'); });
      el.classList.add('active');
    });
    el.addEventListener('dblclick', function() {
      document.querySelectorAll('.rec-item').forEach(function(x){ x.classList.remove('active'); });
      el.classList.add('active');
      activeRecIdx = idx;
      loadRecording(r.d, r.t);
      if (document.getElementById('chk-advance').checked) {
        vF.addEventListener('loadedmetadata', function playOnce() {
          vF.removeEventListener('loadedmetadata', playOnce);
          vF.play().catch(function(){});
        });
      }
    });
    listEl.appendChild(el);
  });
}

/* ═══ Load recording ══════════════════════════════════════ */
function loadRecording(d, t) {
  var base = 'HPIM' + d + '-' + t;
  var pF   = rootName + '/F/' + base + 'F.MOV';
  var pR   = rootName + '/R/' + base + 'R.MOV';
  var pN   = rootName + '/F/' + base + 'F.NMEA';
  if (!allFiles[pN]) pN = rootName + '/' + base + 'F.NMEA';

  /* Front is the only hard requirement */
  if (!allFiles[pF]) {
    alert('Front video not found:\n  F/' + base + 'F.MOV\n\nCheck the selected folder.');
    return;
  }

  hasRear = !!allFiles[pR];
  hasGPS  = !!allFiles[pN];

  /* Reset state */
  gpsPoints = []; ggaMap = {}; startUTC = 0;
  if (vF.src) { URL.revokeObjectURL(vF.src); vF.src = ''; }
  if (vR.src) { URL.revokeObjectURL(vR.src); vR.src = ''; }

  /* Front video — always */
  vF.src = URL.createObjectURL(allFiles[pF]);

  /* Rear video — optional; box always stays same size as front */
  var rearVideo = document.getElementById('vr');
  var rearBlank = document.getElementById('vcam-rear-blank');
  if (hasRear) {
    vR.src = URL.createObjectURL(allFiles[pR]);
    rearVideo.style.display = '';
    rearBlank.style.display = 'none';
  } else {
    rearVideo.style.display = 'none';
    rearBlank.style.display = '';
  }

  /* NMEA / GPS — optional */
  if (hasGPS) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var parsed = parseNMEA(e.target.result);
      gpsPoints  = parsed.rmc;
      ggaMap     = parsed.gga;
      showPlayer();
      if (!gpsPoints.length) {
        setStatus(true, 'No valid GPS fixes in NMEA file', availNote());
        return;
      }
      startUTC = gpsPoints[0].utcSec;
      initMap();
      var dur = gpsPoints[gpsPoints.length - 1].utcSec - startUTC;
      setStatus(false,
        gpsPoints.length + ' GPS fixes \u00b7 ' + availNote(),
        'Duration ' + Math.round(dur) + 's \u00b7 Start UTC ' + fmtTime(startUTC, 0)
      );
      reverseGeocode(gpsPoints[0].lat, gpsPoints[0].lon);
    };
    reader.readAsText(allFiles[pN]);
  } else {
    showPlayer();
    setStatus(false, 'Playing \u00b7 ' + availNote(), 'No GPS log \u2014 map unavailable');
  }
}

function availNote() {
  var parts = ['Front'];
  if (hasRear) parts.push('Rear'); else parts.push('(no rear)');
  if (hasGPS)  parts.push('GPS');  else parts.push('(no GPS)');
  return parts.join(' \u00b7 ');
}

/* ═══ Reverse geocode (Nominatim, called once per recording) ═══ */
function reverseGeocode(lat, lon) {
  var locEl = document.getElementById('slocation');
  locEl.textContent = '';
  var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat=' +
            lat.toFixed(6) + '&lon=' + lon.toFixed(6) + '&zoom=16&addressdetails=1';
  fetch(url, { headers: { 'Accept-Language': 'en' } })
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var a = data.address || {};
      /* Town: prefer city > town > village > suburb > county */
      var town = a.city || a.town || a.village || a.suburb || a.county || '';
      var postcode = a.postcode || '';
      var parts = [];
      if (postcode) parts.push(postcode);
      if (town)     parts.push(town);
      if (parts.length) locEl.textContent = '\u00b7 ' + parts.join(', ');
    })
    .catch(function(){ /* silently ignore — network may be unavailable */ });
}

/* ═══ NMEA parser ════════════════════════════════════════ */
function toSec(s) {
  return parseInt(s.slice(0,2)) * 3600 + parseInt(s.slice(2,4)) * 60 + parseFloat(s.slice(4));
}
function dmm(v, h) {
  var dot = v.indexOf('.');
  var deg = parseFloat(v.slice(0, dot - 2));
  var min = parseFloat(v.slice(dot - 2));
  var d   = deg + min / 60;
  return (h === 'S' || h === 'W') ? -d : d;
}
function parseNMEA(txt) {
  var rmc = [], gga = {};
  txt.split(/\r?\n/).forEach(function(ln) {
    ln = ln.trim();
    var star = ln.indexOf('*');
    var body = (star >= 0 ? ln.slice(1, star) : ln.slice(1));
    var p = body.split(','), id = p[0];
    if ((id === 'GPRMC' || id === 'GNRMC') && p[2] === 'A' && p[1] && p[3] && p[5]) {
      try {
        rmc.push({
          utcSec     : toSec(p[1]),
          lat        : dmm(p[3], p[4]),
          lon        : dmm(p[5], p[6]),
          speedKnots : parseFloat(p[7]) || 0,
          course     : parseFloat(p[8]) || 0
        });
      } catch(e) {}
    }
    if ((id === 'GPGGA' || id === 'GNGGA') && p[1] && p[6] !== '0') {
      try {
        var k = Math.round(toSec(p[1]));
        gga[k] = { sats: parseInt(p[7]) || 0, hdop: parseFloat(p[8]) || 0, alt: parseFloat(p[9]) || 0 };
      } catch(e) {}
    }
  });
  return { rmc: rmc, gga: gga };
}

/* ═══ Map ════════════════════════════════════════════════ */
function initMap() {
  if (leafMap) { leafMap.remove(); leafMap = null; }

  syncMapHeight();   /* set pixel height before Leaflet init */

  leafMap = L.map('map', { zoomSnap: 0.5 });

  /*
   * CARTO Voyager tiles — no Referer policy, works from file:// URLs.
   * This avoids the 403 "Referer required" error from OSM's volunteer servers.
   */
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution : '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains  : 'abcd',
    maxZoom     : 19
  }).addTo(leafMap);

  var lls = gpsPoints.map(function(p){ return [p.lat, p.lon]; });
  L.polyline(lls, { color: '#2a80c8', weight: 4, opacity: .85 }).addTo(leafMap);

  L.circleMarker(lls[0],
    { radius: 6, fillColor: '#5c9e2c', color: '#fff', weight: 2, fillOpacity: 1 })
   .bindTooltip('Start').addTo(leafMap);
  L.circleMarker(lls[lls.length - 1],
    { radius: 6, fillColor: '#c84820', color: '#fff', weight: 2, fillOpacity: 1 })
   .bindTooltip('End').addTo(leafMap);

  gpsMarker = L.marker(lls[0], {
    icon: L.divIcon({
      className  : '',
      html       : '<div style="width:13px;height:13px;background:#e05a30;border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.35)"></div>',
      iconSize   : [13, 13],
      iconAnchor : [6, 6]
    }),
    zIndexOffset: 1000
  }).addTo(leafMap);

  leafMap.fitBounds(
    L.latLngBounds(lls),
    { padding: [20, 20] }
  );
}

function syncMapHeight() {
  var lowerRow = document.getElementById('lower-row');
  var mapEl    = document.getElementById('map');
  if (!lowerRow || !mapEl) return;
  var h = lowerRow.getBoundingClientRect().height;
  if (h > 0) {
    mapEl.style.height = h + 'px';
    if (leafMap) leafMap.invalidateSize();
  }
}

if (window.ResizeObserver) {
  new ResizeObserver(syncMapHeight).observe(document.getElementById('lower-row'));
}

/* ═══ Telemetry update ═══════════════════════════════════ */
function nearest(sec) {
  var pts = gpsPoints, lo = 0, hi = pts.length - 1;
  while (lo < hi) {
    var mid = (lo + hi) >> 1;
    if (pts[mid].utcSec < sec) lo = mid + 1; else hi = mid;
  }
  if (lo > 0 && Math.abs(pts[lo-1].utcSec - sec) < Math.abs(pts[lo].utcSec - sec)) return pts[lo-1];
  return pts[lo];
}

function updateTelemetry(videoTime) {
  if (!gpsPoints.length) return;
  var sec = startUTC + videoTime;
  var p   = nearest(sec);

  if (leafMap && gpsMarker) {
    gpsMarker.setLatLng([p.lat, p.lon]);
    if (!leafMap.getBounds().contains([p.lat, p.lon]))
      leafMap.panTo([p.lat, p.lon], { animate: true, duration: .4 });
  }

  /* speed */
  var unit = document.getElementById('sel-spd').value;
  var spd, spdLbl;
  if      (unit === 'mph') { spd = p.speedKnots * 1.15078; spdLbl = 'mph'; }
  else if (unit === 'kn')  { spd = p.speedKnots;           spdLbl = 'kn';  }
  else                     { spd = p.speedKnots * 1.852;   spdLbl = 'km/h';}
  document.getElementById('tel-spd').textContent   = spd.toFixed(1);
  document.getElementById('tel-spd-u').textContent = ' ' + spdLbl;

  /* time + timezone */
  var tzOff = parseFloat(document.getElementById('sel-tz').value) || 0;
  document.getElementById('tel-time').textContent     = fmtTime(sec, tzOff);
  document.getElementById('tel-time-lbl').textContent = 'Time (' + tzLbl(tzOff) + ')';

  /* position */
  document.getElementById('tel-lat').textContent = p.lat.toFixed(5) + '\u00b0';
  document.getElementById('tel-lon').textContent = p.lon.toFixed(5) + '\u00b0';
  document.getElementById('tel-crs').textContent = Math.round(p.course);

  /* GGA extras */
  var g = ggaMap[Math.round(sec)];
  if (g) {
    document.getElementById('tel-alt').textContent  = g.alt.toFixed(1);
    document.getElementById('tel-sat').textContent  = g.sats;
    document.getElementById('tel-hdop').textContent = g.hdop.toFixed(1);
  }
}

function fmtTime(utcSec, offsetHr) {
  var s = Math.floor(utcSec + offsetHr * 3600) % 86400;
  if (s < 0) s += 86400;
  return pad(Math.floor(s/3600)) + ':' + pad(Math.floor((s%3600)/60)) + ':' + pad(Math.floor(s%60));
}
function tzLbl(off) {
  if (off === 0) return 'UTC';
  var abs = Math.abs(off), h = Math.floor(abs), m = Math.round((abs - h) * 60);
  return (off > 0 ? 'UTC+' : 'UTC\u2212') + h + (m ? ':' + pad(m) : '');
}
function pad(n){ return String(Math.floor(n)).padStart(2, '0'); }

document.getElementById('sel-tz').addEventListener('change',  function(){ updateTelemetry(vF.currentTime || 0); });
document.getElementById('sel-spd').addEventListener('change', function(){ updateTelemetry(vF.currentTime || 0); });

/* ═══ Video sync ═════════════════════════════════════════
   syncTarget tracks which video WE just programmatically seeked.
   When that video's 'seeked' fires we know it was ours — clear
   the flag and ignore it, preventing the feedback loop that was
   causing playback to stall.
══════════════════════════════════════════════════════════ */
var syncTarget = null; /* 'rear' | 'front' | null */

function doSync(video, t) {
  if (Math.abs(video.currentTime - t) < 0.5) return;
  syncTarget = (video === vR) ? 'rear' : 'front';
  video.currentTime = t;
}

vF.addEventListener('play',  function() { if (hasRear) { doSync(vR, vF.currentTime); vR.play().catch(function(){}); } });
vF.addEventListener('pause', function() { if (hasRear) vR.pause(); });
vF.addEventListener('seeked', function() {
  if (syncTarget === 'front') { syncTarget = null; return; } /* our own seek, ignore */
  if (hasRear) doSync(vR, vF.currentTime);
});

vR.addEventListener('play',  function() { if (hasRear) vF.play().catch(function(){}); });
vR.addEventListener('pause', function() { if (hasRear) vF.pause(); });
vR.addEventListener('seeked', function() {
  if (syncTarget === 'rear') { syncTarget = null; return; } /* our own seek, ignore */
  if (hasRear) doSync(vF, vR.currentTime);
});

vF.addEventListener('timeupdate', function() {
  if (hasGPS) updateTelemetry(vF.currentTime);
});

vF.addEventListener('ended', function() {
  if (!document.getElementById('chk-advance').checked) return;
  var next = activeRecIdx + 1;
  if (next >= recsList.length) return;
  var r = recsList[next];
  activeRecIdx = next;
  /* update sidebar highlight */
  var items = document.querySelectorAll('.rec-item');
  items.forEach(function(x){ x.classList.remove('active'); });
  if (items[next]) {
    items[next].classList.add('active');
    items[next].scrollIntoView({ block: 'nearest' });
  }
  loadRecording(r.d, r.t);
  /* auto-play once metadata is ready */
  vF.addEventListener('loadedmetadata', function playOnce() {
    vF.removeEventListener('loadedmetadata', playOnce);
    vF.play().catch(function(){});
  });
});

/* ═══ Show player ════════════════════════════════════════ */
function showPlayer() {
  document.getElementById('placeholder').style.display = 'none';
  if (hasGPS) requestAnimationFrame(function(){ setTimeout(syncMapHeight, 60); });
}

function setStatus(warn, msg, detail) {
  document.getElementById('sdot').className      = 'dot' + (warn ? ' w' : '');
  document.getElementById('smsg').textContent    = msg;
  document.getElementById('sdetail').textContent = detail;
}
</script>
