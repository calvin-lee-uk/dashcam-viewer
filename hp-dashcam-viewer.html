<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP Dashcam Viewer</title>
<!-- link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/ -->
<link rel="stylesheet" href="leaflet.css"/>
<link rel="stylesheet" href="hp-dashcam-viewer.css"/>
</head>
<body>

<div class="app">

  <!-- ── Top: video row ── -->
  <div class="video-row" id="video-row">
    <div class="vcam"><span class="vcam-lbl">FRONT</span><video id="vf" controls preload="metadata"></video></div>
    <div class="vcam" id="vcam-rear">
      <span class="vcam-lbl">REAR</span>
      <video id="vr" controls preload="metadata"></video>
      <div id="vcam-rear-blank" class="vcam-blank" style="display:none">No rear recording</div>
    </div>
  </div>

  <!-- ── Bottom: lower-row + sbar ── -->
  <div class="lower-section">

    <div class="lower-row" id="lower-row">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sb-top">
          <div class="folder-wrap">
            <input type="file" id="folder-input" webkitdirectory multiple>
            <label for="folder-input">&#128193; Select folder</label>
          </div>
          <div class="folder-path" id="folder-path"></div>
        </div>
        <div class="sb-label">Recordings</div>
        <div class="rec-list" id="rec-list">
          <div class="rec-empty">Select the dashcam parent folder above.<br>Recordings in F/ will be listed here.</div>
        </div>
      </aside>

      <!-- Map -->
      <div id="map">
        <div class="placeholder" id="placeholder">
          <div class="ph-ico">&#127909;</div>
          <p>Double-click a recording<br>from the list to begin</p>
        </div>
      </div>

      <!-- Telemetry -->
      <div class="telem" id="telem">
        <div class="telem-title">Telemetry</div>

        <div class="trow">
          <span class="lbl">Time zone</span>
          <select id="sel-tz" title="Time zone">
            <option value="-12">UTC−12</option>
            <option value="-11">UTC−11</option>
            <option value="-10">UTC−10 HST</option>
            <option value="-9">UTC−9 AKST</option>
            <option value="-8">UTC−8 PST</option>
            <option value="-7">UTC−7 MST</option>
            <option value="-6">UTC−6 CST</option>
            <option value="-5">UTC−5 EST</option>
            <option value="-4">UTC−4 AST</option>
            <option value="-3">UTC−3</option>
            <option value="-2">UTC−2</option>
            <option value="-1">UTC−1</option>
            <option value="0">UTC</option>
            <option value="1">UTC+1 BST</option>
            <option value="2">UTC+2 CEST</option>
            <option value="3">UTC+3 MSK</option>
            <option value="4">UTC+4 GST</option>
            <option value="5">UTC+5 PKT</option>
            <option value="5.5">UTC+5:30 IST</option>
            <option value="6">UTC+6 BST</option>
            <option value="7">UTC+7 ICT</option>
            <option value="8">UTC+8 CST</option>
            <option value="9">UTC+9 JST</option>
            <option value="9.5">UTC+9:30 ACST</option>
            <option value="10">UTC+10 AEST</option>
            <option value="11">UTC+11</option>
            <option value="12">UTC+12 NZST</option>
          </select>
        </div>

        <div class="trow">
          <span class="lbl">Speed unit</span>
          <select id="sel-spd" title="Speed unit">
            <option value="kmh">km/h</option>
            <option value="mph" selected>mph</option>
            <option value="kn">kn</option>
          </select>
        </div>

        <div class="trow">
          <span class="lbl" id="tel-time-lbl">Time</span>
          <span class="val" id="tel-time">—</span>
        </div>

        <div class="trow">
          <span class="lbl">Speed</span>
          <span class="val big"><span id="tel-spd">—</span><span id="tel-spd-u" style="font-size:10px;color:#aaa"> mph</span></span>
        </div>

        <div class="trow">
          <span class="lbl">Latitude</span>
          <span class="val" id="tel-lat">—</span>
        </div>

        <div class="trow">
          <span class="lbl">Longitude</span>
          <span class="val" id="tel-lon">—</span>
        </div>

        <div class="trow">
          <span class="lbl">Altitude</span>
          <span class="val"><span id="tel-alt">—</span><span style="font-size:10px;color:#aaa"> m</span></span>
        </div>

        <div class="trow">
          <span class="lbl">Satellites</span>
          <span class="val" id="tel-sat">—</span>
        </div>

        <div class="trow">
          <span class="lbl">HDOP</span>
          <span class="val" id="tel-hdop">—</span>
        </div>

        <div class="trow">
          <span class="lbl">Heading</span>
          <span class="val"><span id="tel-crs">—</span><span style="font-size:10px;color:#aaa">°</span></span>
        </div>
      </div>

    </div><!-- /.lower-row -->

    <div class="sbar" id="sbar">
      <span class="dot" id="sdot"></span>
      <span id="smsg">Ready</span>
      <span style="color:#ddd">·</span>
      <span id="sdetail"></span>
      <span id="slocation" class="slocation"></span>
      <label class="lbl-advance">
        <input type="checkbox" id="chk-advance" checked style="cursor:pointer"> Auto-advance
      </label>
    </div>

  </div><!-- /.lower-section -->

</div><!-- /.app -->

<!--script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script-->
<script src="leaflet.js"></script>
<script src="hp-dashcam-viewer.js"></script>
</body>
</html>
